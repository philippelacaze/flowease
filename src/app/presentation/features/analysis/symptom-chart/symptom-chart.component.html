    <div class="chart-wrapper">
      <div class="selector-row">
        <mat-form-field appearance="outline" class="symptom-select" subscriptSizing="dynamic">
          <mat-label>Superposer</mat-label>
          <mat-select
            [(ngModel)]="secondSymptomKey"
            (ngModelChange)="onSecondSymptomChange()"
            aria-label="Sélectionner un second symptôme à superposer"
          >
            <mat-option [value]="null">Aucun</mat-option>
            <mat-option *ngFor="let opt of SYMPTOM_OPTIONS" [value]="opt.key">
              {{ opt.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div *ngIf="loading" class="chart-state" role="status">Chargement…</div>

      <ng-container *ngIf="!loading">
        <div *ngIf="primaryPoints.length === 0" class="chart-state" role="status" data-testid="chart-empty">
          Aucune donnée sur la période.
        </div>

        <svg
          *ngIf="primaryPoints.length > 0"
          viewBox="0 0 320 180"
          class="chart-svg"
          role="img"
          aria-label="Graphique d'évolution du symptôme"
        >
          <!-- Grid -->
          <line x1="36" y1="16" x2="36" y2="152"
            stroke="var(--mat-sys-outline-variant)" stroke-width="1" />
          <line x1="36" y1="152" x2="312" y2="152"
            stroke="var(--mat-sys-outline-variant)" stroke-width="1" />
          <line x1="36" y1="84" x2="312" y2="84"
            stroke="var(--mat-sys-outline-variant)" stroke-width="0.5" stroke-dasharray="2 4" />

          <!-- Y labels -->
          <text x="30" y="20" text-anchor="end" font-size="10" fill="var(--mat-sys-on-surface-variant)">10</text>
          <text x="30" y="88" text-anchor="end" font-size="10" fill="var(--mat-sys-on-surface-variant)">5</text>
          <text x="30" y="156" text-anchor="end" font-size="10" fill="var(--mat-sys-on-surface-variant)">0</text>

          <!-- X labels -->
          <text
            *ngFor="let lbl of xAxisLabels"
            [attr.x]="lbl.x"
            y="170"
            text-anchor="middle"
            font-size="9"
            fill="var(--mat-sys-on-surface-variant)"
          >{{ lbl.label }}</text>

          <!-- Primary — dashed gaps -->
          <line
            *ngFor="let seg of primaryDashedSegs"
            [attr.x1]="seg.x1" [attr.y1]="seg.y1"
            [attr.x2]="seg.x2" [attr.y2]="seg.y2"
            stroke="var(--mat-sys-primary)"
            stroke-width="1.5"
            stroke-dasharray="4 4"
            opacity="0.5"
          />

          <!-- Primary — solid path -->
          <path
            [attr.d]="primarySolidPath"
            fill="none"
            stroke="var(--mat-sys-primary)"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />

          <!-- Primary — dots -->
          <circle
            *ngFor="let p of primaryPoints"
            [attr.cx]="p.x" [attr.cy]="p.y"
            r="3"
            fill="var(--mat-sys-primary)"
          />

          <!-- Secondary series -->
          <ng-container *ngIf="secondaryPoints.length > 0">
            <line
              *ngFor="let seg of secondaryDashedSegs"
              [attr.x1]="seg.x1" [attr.y1]="seg.y1"
              [attr.x2]="seg.x2" [attr.y2]="seg.y2"
              stroke="var(--mat-sys-secondary)"
              stroke-width="1.5"
              stroke-dasharray="4 4"
              opacity="0.5"
            />
            <path
              [attr.d]="secondarySolidPath"
              fill="none"
              stroke="var(--mat-sys-secondary)"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <circle
              *ngFor="let p of secondaryPoints"
              [attr.cx]="p.x" [attr.cy]="p.y"
              r="3"
              fill="var(--mat-sys-secondary)"
            />
          </ng-container>
        </svg>

        <!-- Legend -->
        <div *ngIf="primaryPoints.length > 0" class="legend" aria-label="Légende du graphique">
          <span class="legend-primary">
            <span class="legend-dot" style="background:var(--mat-sys-primary)"></span>
            {{ symptomKey }}
          </span>
          <span *ngIf="secondaryPoints.length > 0" class="legend-secondary">
            <span class="legend-dot" style="background:var(--mat-sys-secondary)"></span>
            {{ secondSymptomKey }}
          </span>
        </div>
      </ng-container>
    </div>
