<span class="food-chip" [ngClass]="levelClass" role="listitem">
  <span class="food-chip__dot" aria-hidden="true"></span>
  <span class="food-chip__name" [attr.aria-label]="chipAriaLabel">
    {{ item.name }}
    @if (item.quantity) {
      <span class="food-chip__qty"> {{ item.quantity }}{{ item.unit }}</span>
    }
  </span>
  @if (!item.confirmed) {
    <span class="food-chip__ai-badge" aria-label="Suggestion IA non validée">IA</span>
  }
  @if (editable) {
    <button class="food-chip__btn" [attr.aria-label]="'Confirmer ' + item.name" (click)="edit.emit(item)">✓</button>
    <button class="food-chip__btn food-chip__btn--remove" [attr.aria-label]="'Retirer ' + item.name" (click)="remove.emit()">×</button>
  } @else if (removable) {
    <button class="food-chip__btn food-chip__btn--remove" [attr.aria-label]="'Retirer ' + item.name" (click)="remove.emit()">×</button>
  }
</span>
