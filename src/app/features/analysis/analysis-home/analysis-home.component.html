<div class="analysis-header">
  <span class="analysis-title">Analyse</span>
  <div class="window-pills" aria-label="Fenêtre temporelle d'analyse" data-testid="window-toggle">
    @for (d of [7, 30, 90]; track d) {
      <button class="window-pill"
              [class.window-pill--active]="windowDays === d"
              [attr.aria-label]="d + ' jours'"
              (click)="onWindowChange(d)">{{ d }}j</button>
    }
  </div>
</div>

@if (lastAnalysisDate) {
  <div class="last-analysis-bar" role="status" aria-live="polite" data-testid="last-analysis-bar">
    Dernière analyse : {{ lastAnalysisDaysAgo }}
  </div>
}

<div class="analysis-body">

  <!-- Évolution des symptômes -->
  <div class="sc-card">
    <div class="sc-header">
      <span aria-hidden="true">📈</span>
      <span class="sc-title">Évolution des symptômes</span>
    </div>
    <div class="sc-body">
      <div class="chart-selectors">
        <select class="chart-select"
                [(ngModel)]="primarySymptom"
                aria-label="Symptôme principal"
                data-testid="primary-symptom-select"
                (ngModelChange)="onSymptomChange()">
          @for (opt of symptomOptions; track opt.key) {
            <option [value]="opt.key">{{ opt.label }}</option>
          }
        </select>
        <select class="chart-select"
                [(ngModel)]="secondarySymptom"
                aria-label="Symptôme secondaire à superposer"
                data-testid="secondary-symptom-select"
                (ngModelChange)="onSymptomChange()">
          <option [ngValue]="null">Aucun</option>
          @for (opt of symptomOptions; track opt.key) {
            <option [value]="opt.key">{{ opt.label }}</option>
          }
        </select>
      </div>
      <app-symptom-chart
        [primaryKey]="primarySymptom"
        [secondaryKey]="secondarySymptom"
        [windowDays]="windowDays" />
    </div>
  </div>

  <!-- Bien-être quotidien -->
  <div class="sc-card">
    <div class="sc-header">
      <span aria-hidden="true">💚</span>
      <span class="sc-title">Bien-être quotidien</span>
    </div>
    <div class="sc-body">
      <app-wellbeing-heatmap [windowDays]="windowDays" />
    </div>
  </div>

  <!-- Observance traitements -->
  <div class="sc-card">
    <div class="sc-header sc-header--amber">
      <span aria-hidden="true">💊</span>
      <span class="sc-title">Observance traitements</span>
    </div>
    <div class="sc-body">
      <app-adherence-calendar [windowDays]="windowDays" />
    </div>
  </div>

  <!-- Analyses IA -->
  <div class="sc-card">
    <div class="sc-header sc-header--blue">
      <span aria-hidden="true">✨</span>
      <span class="sc-title">Analyses IA</span>
    </div>
    <div class="sc-body">
      <app-ai-insights [refreshKey]="insightsRefreshKey" />
    </div>
  </div>

</div>

<!-- FAB : bouton natif, remplace mat-fab -->
<button class="analysis-fab"
        [class.analysis-fab--loading]="analyzing"
        aria-label="Lancer une analyse IA"
        data-testid="run-analysis-fab"
        [disabled]="analyzing"
        (click)="openRunDialog()">
  @if (analyzing) {
    <span class="fab-spinner" aria-hidden="true"></span>
    <span>Analyse…</span>
  } @else {
    ✨
  }
</button>
