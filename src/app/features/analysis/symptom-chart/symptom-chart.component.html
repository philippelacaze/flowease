<div class="chart-wrapper">
  @if (loading) {
    <div class="chart-state" role="status">Chargement…</div>
  }

  @if (!loading) {
    @if (primaryPoints.length === 0) {
      <div class="chart-state" role="status" data-testid="chart-empty">
        Aucune donnée sur la période.
      </div>
    }
    @if (primaryPoints.length > 0) {
      <svg
        viewBox="0 0 320 180"
        class="chart-svg"
        role="img"
        aria-label="Graphique d'évolution du symptôme"
        >
        <!-- Grid -->
        <line x1="36" y1="16" x2="36" y2="152"
          stroke="var(--border)" stroke-width="1" />
        <line x1="36" y1="152" x2="312" y2="152"
          stroke="var(--border)" stroke-width="1" />
        <line x1="36" y1="84" x2="312" y2="84"
          stroke="var(--border)" stroke-width="0.5" stroke-dasharray="2 4" />
        <!-- Y labels -->
        <text x="30" y="20" text-anchor="end" font-size="10" fill="var(--text-3)">10</text>
        <text x="30" y="88" text-anchor="end" font-size="10" fill="var(--text-3)">5</text>
        <text x="30" y="156" text-anchor="end" font-size="10" fill="var(--text-3)">0</text>
        <!-- X labels -->
        @for (lbl of xAxisLabels; track lbl) {
          <text
            [attr.x]="lbl.x"
            y="170"
            text-anchor="middle"
            font-size="9"
            fill="var(--text-3)"
          >{{ lbl.label }}</text>
        }
        <!-- Primary — dashed gaps -->
        @for (seg of primaryDashedSegs; track seg) {
          <line
            [attr.x1]="seg.x1" [attr.y1]="seg.y1"
            [attr.x2]="seg.x2" [attr.y2]="seg.y2"
            stroke="var(--teal)"
            stroke-width="1.5"
            stroke-dasharray="4 4"
            opacity="0.5"
            />
        }
        <!-- Primary — solid path -->
        <path
          [attr.d]="primarySolidPath"
          fill="none"
          stroke="var(--teal)"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          />
        <!-- Primary — dots -->
        @for (p of primaryPoints; track p) {
          <circle
            [attr.cx]="p.x" [attr.cy]="p.y"
            r="3"
            fill="var(--teal)"
            />
        }
        <!-- Secondary series (coral, tirets) -->
        @if (secondaryPoints.length > 0) {
          <ng-container>
            @for (seg of secondaryDashedSegs; track seg) {
              <line
                [attr.x1]="seg.x1" [attr.y1]="seg.y1"
                [attr.x2]="seg.x2" [attr.y2]="seg.y2"
                stroke="var(--coral)"
                stroke-width="1.5"
                stroke-dasharray="4 4"
                opacity="0.5"
                />
            }
            <path
              [attr.d]="secondarySolidPath"
              fill="none"
              stroke="var(--coral)"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-dasharray="6 3"
              />
            @for (p of secondaryPoints; track p) {
              <circle
                [attr.cx]="p.x" [attr.cy]="p.y"
                r="3"
                fill="var(--coral)"
                />
            }
          </ng-container>
        }
      </svg>
    }
    <!-- Legend -->
    @if (primaryPoints.length > 0) {
      <div class="legend" aria-label="Légende du graphique">
        <span class="legend-item">
          <span class="legend-dot" style="background:var(--teal)"></span>
          Principal
        </span>
        @if (secondaryPoints.length > 0) {
          <span class="legend-item">
            <span class="legend-dot" style="background:var(--coral)"></span>
            Secondaire
          </span>
        }
      </div>
    }
  }
</div>
