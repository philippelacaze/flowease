<h2 class="sheet-name">{{ data.treatment.name }}</h2>
<div class="sheet-meta">{{ data.treatment.dosage }} {{ data.treatment.unit }} · {{ data.treatment.frequency }}×/j</div>

<div class="sheet-tiles">
  <div class="sheet-tile">
    <span class="sheet-tile-label">Heure</span>
    <input
      type="time"
      class="sheet-tile-input"
      [(ngModel)]="detailTime"
      aria-label="Heure effective de la prise"
      data-testid="detail-time"
      />
  </div>
  <div class="sheet-tile">
    <span class="sheet-tile-label">Dose</span>
    <input
      class="sheet-tile-input"
      [(ngModel)]="detailDose"
      [attr.placeholder]="data.treatment.dosage + ' ' + data.treatment.unit"
      aria-label="Dose réelle prise"
      data-testid="detail-dose"
      />
  </div>
</div>

<div class="sheet-note">
  <label class="sheet-note-label" for="sheet-note-input">Note (optionnelle)</label>
  <textarea
    id="sheet-note-input"
    class="sheet-note-input"
    [(ngModel)]="detailNote"
    placeholder="Ex : pris avec repas léger…"
    aria-label="Note libre sur la prise"
    data-testid="detail-note"
    rows="3"
  ></textarea>
</div>

@if (showSkipReason) {
  <div class="sheet-skip-reason">
    <label class="sheet-skip-reason-label" for="sheet-skip-reason-select">
      Raison du saut
    </label>
    <select
      id="sheet-skip-reason-select"
      class="sheet-skip-reason-select"
      [(ngModel)]="selectedSkipReason"
      aria-label="Raison du saut de la prise"
      data-testid="skip-reason-select"
    >
      <option value="">— Sélectionner —</option>
      @for (opt of skipReasonOptions; track opt.value) {
        <option [value]="opt.value">{{ opt.label }}</option>
      }
    </select>
  </div>
}

<div class="sheet-actions">
  <button
    class="sheet-btn sheet-btn--taken"
    aria-label="Confirmer la prise"
    data-testid="confirm-taken"
    (click)="confirmTaken()"
    >
    ✓ Pris
  </button>
  <button
    [class]="showSkipReason ? 'sheet-btn sheet-btn--skipped-confirm' : 'sheet-btn sheet-btn--skipped'"
    [attr.aria-label]="showSkipReason ? 'Confirmer le saut de la prise' : 'Marquer comme sauté'"
    data-testid="confirm-skipped"
    (click)="initiateSkip()"
    >
    {{ showSkipReason ? 'Confirmer le saut' : 'Sauté' }}
  </button>
</div>
