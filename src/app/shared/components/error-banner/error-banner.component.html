@if (svc.current(); as notif) {
  <div
    class="banner banner--{{ notif.type }}"
    role="alert"
    aria-live="assertive"
    data-testid="error-banner"
  >
    <mat-icon class="banner-icon" aria-hidden="true">
      @switch (notif.type) {
        @case ('error')   { error_outline }
        @case ('warning') { warning_amber }
        @case ('success') { check_circle_outline }
      }
    </mat-icon>
    <span class="banner-message">{{ notif.message }}</span>
    <button
      mat-icon-button
      class="banner-close"
      aria-label="Fermer le message"
      (click)="svc.dismiss()"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>
}
