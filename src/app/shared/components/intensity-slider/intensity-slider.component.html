<div class="intensity-slider">
  <div class="intensity-header">
    <span class="intensity-label">{{ label }}</span>
    <span class="intensity-val" [style.color]="scoreColor">
      {{ value > 0 ? value + '/10' : '—' }}
    </span>
  </div>
  <input type="range" min="0" max="10" step="1"
         [value]="value"
         [style.accent-color]="scoreColor"
         class="intensity-range"
         aria-valuemin="0"
         aria-valuemax="10"
         [attr.aria-valuenow]="value"
         [attr.aria-label]="label + ' — ' + (value > 0 ? value + ' sur 10' : 'absent')"
         data-testid="intensity-range"
         (input)="onInput($event)" />
  <div class="intensity-legend" aria-hidden="true">
    <span>Absent</span><span>Modéré</span><span>Intense</span>
  </div>
</div>
