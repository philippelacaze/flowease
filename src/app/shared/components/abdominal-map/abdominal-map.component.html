<div class="abdominal-map-container" role="group" aria-label="Cartographie des douleurs abdominales">
  <!-- SVG : indicateur visuel uniquement — interaction via les boutons ci-dessous -->
  <svg
    viewBox="0 0 200 280"
    xmlns="http://www.w3.org/2000/svg"
    class="abdominal-svg"
    aria-hidden="true"
    >
    <!-- Silhouette abdominale -->
    <ellipse cx="100" cy="140" rx="80" ry="120"
             fill="var(--surface-var)"
             stroke="var(--border)"
             stroke-width="1.5"/>

    <!-- Zones (visuelles seulement, pointer-events désactivés) -->
    @for (zone of zones; track zone) {
      <rect
        [attr.x]="zone.x"
        [attr.y]="zone.y"
        [attr.width]="zone.width"
        [attr.height]="zone.height"
        rx="8"
        [class]="isSelected(zone.id) ? 'zone-selected' : 'zone-idle'"
        pointer-events="none"
        />
    }

    <!-- Labels dans les zones -->
    @for (zone of zones; track zone) {
      <text
        [attr.x]="zone.x + zone.width / 2"
        [attr.y]="zone.y + zone.height / 2 + 4"
        text-anchor="middle"
        font-size="9"
        class="zone-label"
        pointer-events="none"
      >{{ zone.labelFr }}</text>
    }
  </svg>

  <!-- Boutons accessibles (seuls éléments interactifs) -->
  <div class="zone-buttons" role="group" aria-label="Sélectionner les zones de douleur">
    @for (zone of zones; track zone) {
      <button
        class="zone-btn"
        [class.zone-btn--selected]="isSelected(zone.id)"
        [attr.aria-label]="zone.labelFr + (isSelected(zone.id) ? ' — sélectionnée' : '')"
        [attr.aria-pressed]="isSelected(zone.id)"
        (click)="toggleZone(zone.id)"
      >{{ zone.labelFr }}</button>
    }
  </div>
</div>
